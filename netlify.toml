[build]
  publish = "."
  functions = "functions"

[build.environment]
  NODE_VERSION = "18"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/anthropic"
  to = "/.netlify/functions/anthropic-proxy"
  status = 200

[[redirects]]
  from = "/api/company-search"
  to = "/.netlify/functions/company-search"
  status = 200

[[redirects]]
  from = "/api/bolagsverket"
  to = "/.netlify/functions/bolagsverket-proxy"
  status = 200

[[redirects]]
  from = "/api/scb"
  to = "/.netlify/functions/scb-proxy"
  status = 200

[[redirects]]
  from = "/api/ownership"
  to = "/.netlify/functions/ownership-proxy"
  status = 200
